<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>투자 물상 진단 · 知我世</title>
<script src="https://cdn.jsdelivr.net/npm/lunar-javascript@1.7.3/lunar.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
@font-face{font-family:'NSK';src:local('Noto Serif KR');}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#0F0D0B;color:#EDE3CF;font-family:'Pretendard','Apple SD Gothic Neo',sans-serif;
  -webkit-font-smoothing:antialiased;overscroll-behavior:none}
body{padding-bottom:40px}
.mono{font-family:ui-monospace,'SF Mono',Consolas,monospace}

/* ── 티커 테이프 ── */
.ticker-wrap{overflow:hidden;border-bottom:1px solid #2A2620;background:#120F0C;height:34px;
  display:flex;align-items:center}
.ticker{display:flex;gap:22px;white-space:nowrap;animation:scroll 18s linear infinite;padding-left:14px}
.ticker.paused{animation-play-state:paused}
@keyframes scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.tick{font-size:12px;letter-spacing:.02em;color:#6b6557;display:flex;align-items:center;gap:5px}
.tick .sym{color:#C8A24A;font-weight:700}
.tick.up{color:#6FA287}
.tick.down{color:#B5573D}
.tick.hl{color:#EDE3CF;background:rgba(200,162,74,.12);padding:3px 8px;border-radius:3px;
  box-shadow:0 0 0 1px rgba(200,162,74,.35) inset}

/* ── 히어로 ── */
.wrap{max-width:480px;margin:0 auto;padding:0 18px}
.hero{padding:34px 0 22px;text-align:left}
.eyebrow{display:flex;align-items:center;gap:8px;font-size:10.5px;letter-spacing:.24em;color:#C8A24A;font-weight:700;margin-bottom:12px}
.eyebrow-logo{width:22px;height:22px;border-radius:6px;flex-shrink:0}
.oheng-divider{display:flex;gap:6px;margin-top:16px}
.oheng-divider span{width:7px;height:7px;border-radius:50%;display:inline-block}
.oheng-divider span:nth-child(1){background:#4caf60}
.oheng-divider span:nth-child(2){background:#d9483a}
.oheng-divider span:nth-child(3){background:#C8A24A}
.oheng-divider span:nth-child(4){background:#9aa0a6}
.oheng-divider span:nth-child(5){background:#4a6fb0}
b{color:#C8A24A;font-weight:800}
.title{font-family:Georgia,'Noto Serif KR',serif;font-size:25px;line-height:1.42;color:#EDE3CF;
  font-weight:700;letter-spacing:-.01em}
.title b{color:#C8A24A}
.sub{font-size:13px;color:#9a917e;margin-top:10px;line-height:1.65}

/* ── 입력 카드 ── */
.card{background:#15120E;border:1px solid #2A2620;border-radius:6px;padding:20px;margin-top:18px}
.card-label{font-size:11px;color:#7e7665;letter-spacing:.08em;margin-bottom:12px;
  display:flex;align-items:center;gap:8px}
.card-label::after{content:'';flex:1;height:1px;background:#2A2620}
.seg{display:flex;gap:6px;margin-bottom:14px}
.seg button{flex:1;background:#1C1815;border:1px solid #2A2620;color:#9a917e;font-size:12.5px;
  padding:8px 0;border-radius:4px;cursor:pointer;transition:.15s}
.seg button.active{background:#C8A24A;border-color:#C8A24A;color:#15120E;font-weight:700}
.row3{display:grid;grid-template-columns:1.2fr 1fr 1fr;gap:8px}
.field label{display:block;font-size:10.5px;color:#6b6557;margin-bottom:5px;letter-spacing:.04em}
.field input{width:100%;background:#0F0D0B;border:1px solid #2A2620;color:#EDE3CF;
  font-size:15px;padding:10px;border-radius:4px;font-family:inherit}
.field input:focus{outline:none;border-color:#C8A24A}
.opt{display:flex;align-items:center;gap:7px;margin-top:12px;font-size:12px;color:#9a917e}
.opt input{accent-color:#C8A24A}

.btn{width:100%;background:#C8A24A;color:#15120E;font-weight:700;font-size:15px;
  padding:14px;border:none;border-radius:5px;margin-top:18px;cursor:pointer;letter-spacing:.02em;
  transition:.15s}
.btn:hover{background:#dab35a}
.btn:disabled{opacity:.4;cursor:default}
.err{color:#B5573D;font-size:12px;margin-top:10px;display:none}

/* ── 결과 ── */
#result{display:none;margin-top:22px}
.ticket{background:#15120E;border:1px solid #2A2620;border-radius:6px;overflow:hidden}
.ticket-head{padding:18px 20px;border-bottom:1px solid #2A2620;display:flex;justify-content:space-between;
  align-items:center}
.tk-name{font-family:Georgia,'Noto Serif KR',serif;font-size:18px;color:#EDE3CF}
.tk-code{font-size:11px;color:#6b6557;margin-top:3px}
.tk-badge{font-size:22px;color:#C8A24A;font-weight:700;font-family:'Noto Serif KR',serif}
.gisil{padding:16px 20px;font-size:13.5px;line-height:1.7;color:#cfc6b3;border-bottom:1px dashed #2A2620}

.slist{padding:16px 20px}
.slist-head{font-size:11px;letter-spacing:.1em;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.slist-head.up{color:#6FA287}
.slist-head.down{color:#B5573D}
.asset-row{display:flex;align-items:flex-start;gap:10px;padding:8px 0}
.asset-arrow{font-size:14px;width:16px;flex-shrink:0;margin-top:1px}
.asset-arrow.up{color:#6FA287}
.asset-arrow.down{color:#B5573D}
.asset-name{font-size:13.5px;color:#EDE3CF;font-weight:600}
.asset-desc{font-size:11.5px;color:#7e7665;margin-top:1px}

.rx{padding:16px 20px;background:#120F0C;font-size:13px;line-height:1.8;color:#cfc6b3}
.rx b{color:#C8A24A}
.heal{padding:14px 20px 18px;font-size:12.5px;line-height:1.75;color:#9a917e;font-style:normal}

.disclaim{font-size:10.5px;color:#5a544a;line-height:1.6;padding:14px 20px;border-top:1px solid #2A2620}

.cta-wrap{margin-top:14px;display:flex;flex-direction:column;gap:8px}
.cta-main{display:block;text-align:center;background:transparent;border:1px solid #C8A24A;
  color:#C8A24A;font-size:13.5px;font-weight:600;padding:13px;border-radius:5px;text-decoration:none}
.cta-tg{display:none;text-align:center;background:#2A2620;color:#9a917e;font-size:12.5px;
  padding:11px;border-radius:5px;border:none;cursor:pointer}
</style>
</head>
<body>

<div class="ticker-wrap"><div class="ticker" id="tickerTape"></div></div>

<div class="wrap">
  <div class="hero">
    <div class="eyebrow"><img src="./jiaseh_symbol_traced_light_FINAL.png" class="eyebrow-logo" alt="지아세">投資物相診斷 · MINI</div>
    <div class="title">당신의 투자는<br><b>어떤 자산</b>과 맞을까</div>
    <div class="sub">생년월일만 넣으면, 받쳐주는 자산군과<br>반복적으로 손실 나는 자산군을 바로 짚어드립니다.</div>
    <div class="oheng-divider"><span></span><span></span><span></span><span></span><span></span></div>
  </div>

  <div class="card">
    <div class="card-label">생년월일</div>
    <div class="seg">
      <button id="segSolar" class="active" onclick="setCal('solar')">양력</button>
      <button id="segLunar" onclick="setCal('lunar')">음력</button>
    </div>
    <div class="row3">
      <div class="field"><label>년</label><input type="number" id="iy" placeholder="1990" inputmode="numeric"></div>
      <div class="field"><label>월</label><input type="number" id="im" placeholder="1" inputmode="numeric"></div>
      <div class="field"><label>일</label><input type="number" id="id" placeholder="1" inputmode="numeric"></div>
    </div>
    <label class="opt" id="leapWrap" style="display:none">
      <input type="checkbox" id="leap"> 윤달
    </label>
    <button class="btn" id="goBtn" onclick="diagnose()">내 물상 진단하기</button>
    <div class="err" id="errMsg"></div>
  </div>

  <div id="result"></div>
</div>

<script>
/* ══════════ 명리 엔진 (지아세_랜딩_P3.html 일간 산출 로직과 동일 소스) ══════════ */
const GAN_OH={甲:'木',乙:'木',丙:'火',丁:'火',戊:'土',己:'土',庚:'金',辛:'金',壬:'水',癸:'水'};
const SHENG={木:'火',火:'土',土:'金',金:'水',水:'木'};
const KE={木:'土',土:'水',水:'火',火:'金',金:'木'};
function reverseMap(m){const r={};for(const k in m)r[m[k]]=k;return r;}
const SHENG_REV=reverseMap(SHENG); // X를 생(生)하는 오행
const KE_REV=reverseMap(KE);       // X를 극(剋)하는 오행

const HANJA={甲:'甲',乙:'乙',丙:'丙',丁:'丁',戊:'戊',己:'己',庚:'庚',辛:'辛',壬:'壬',癸:'癸'};
const HANGUL={甲:'갑목',乙:'을목',丙:'병화',丁:'정화',戊:'무토',己:'기토',庚:'경금',辛:'신금',壬:'임수',癸:'계수'};

const GISIL={
  甲:'위로 뻗는 큰 나무처럼, 방향을 정하면 끝까지 밀고 가는 기질입니다.',
  乙:'휘어지는 풀처럼, 환경에 맞춰 유연하게 흐르는 기질입니다.',
  丙:'태양처럼 확 퍼지는, 화통하고 추진력 있는 기질입니다.',
  丁:'촛불처럼 한곳에 집중해 깊이 파고드는 기질입니다.',
  戊:'높은 산처럼, 흔들려도 중심을 잡고 버티는 기질입니다.',
  己:'기름진 밭처럼, 받아들이고 길러내며 품는 기질입니다.',
  庚:'제련 전 무쇠처럼, 결단이 빠르고 끝까지 밀어붙이는 기질입니다.',
  辛:'세공된 보석처럼, 예리하고 섬세하게 가려내는 기질입니다.',
  壬:'큰 물처럼, 여러 흐름을 한 번에 품고 순환시키는 기질입니다.',
  癸:'스며드는 이슬처럼, 조용히 끊임없이 적시는 기질입니다.'
};

const ASSET={
  木:{ar:'🌳',name:'성장 계열',desc:'글로벌 기술지수 · 성장주'},
  火:{ar:'🔥',name:'에너지 계열',desc:'에너지 · 테마주 · 변동성 자산'},
  土:{ar:'🏠',name:'실물 · 안정 계열',desc:'부동산 · 현물 · 국내지수'},
  金:{ar:'💰',name:'금융 · 경화 계열',desc:'금 · 달러 · 금융지수'},
  水:{ar:'🌊',name:'유동성 계열',desc:'원유 · 환율흐름 · 디지털자산군'}
};
const OH_ORDER=['木','火','土','金','水'];

/* ══════════ 양력/음력 토글 ══════════ */
let calMode='solar';
function setCal(m){
  calMode=m;
  document.getElementById('segSolar').classList.toggle('active',m==='solar');
  document.getElementById('segLunar').classList.toggle('active',m==='lunar');
  document.getElementById('leapWrap').style.display=m==='lunar'?'flex':'none';
}

/* ══════════ 티커 테이프 (장식 + 결과 후 매칭 강조) ══════════ */
function renderTicker(hlUp,hlDown){
  const items=[];
  OH_ORDER.forEach(oh=>{
    const a=ASSET[oh];
    const isUp=hlUp && hlUp.includes(oh);
    const isDown=hlDown && hlDown.includes(oh);
    const cls=isUp?'tick hl up':isDown?'tick hl down':(Math.random()>0.5?'tick up':'tick down');
    const arrow=isUp?'▲':isDown?'▼':(cls.includes('up')?'▲':'▼');
    items.push(`<span class="${cls}"><span class="sym">${oh}</span>${a.name} ${arrow}</span>`);
  });
  const html=items.join('')+items.join(''); // 루프용 더블
  const el=document.getElementById('tickerTape');
  el.innerHTML=html;
  el.classList.toggle('paused', !!(hlUp||hlDown));
}
renderTicker();

/* ══════════ 진단 실행 ══════════ */
function diagnose(){
  const errEl=document.getElementById('errMsg');
  errEl.style.display='none';
  const y=+document.getElementById('iy').value, m=+document.getElementById('im').value, d=+document.getElementById('id').value;
  if(!y||!m||!d||y<1900||y>2100){
    errEl.textContent='생년월일을 정확히 입력해 주세요.'; errEl.style.display='block'; return;
  }
  let dayGan;
  try{
    let solar;
    if(calMode==='lunar'){
      const leap=document.getElementById('leap').checked;
      const lun=Lunar.fromYmdHms(y, leap?-m:m, d, 12,0,0);
      solar=lun.getSolar();
    } else {
      solar=Solar.fromYmdHms(y,m,d,12,0,0);
    }
    dayGan=solar.getLunar().getEightChar().getDayGan();
  }catch(e){
    errEl.textContent='날짜 변환 중 문제가 발생했습니다. 윤달 여부나 일자를 확인해 주세요.';
    errEl.style.display='block'; return;
  }

  const dayOh=GAN_OH[dayGan];
  const inseong=SHENG_REV[dayOh];   // 받쳐주는 보조 오행
  const gwanseong=KE_REV[dayOh];    // 반복 손실 오행

  const upOh=[dayOh, inseong];
  const downOh=[gwanseong];

  renderResult(dayGan, dayOh, upOh, downOh);
  renderTicker(upOh, downOh);
  document.getElementById('result').style.display='block';
  document.getElementById('result').scrollIntoView({behavior:'smooth', block:'start'});
}

function assetRow(oh, dir){
  const a=ASSET[oh];
  return `<div class="asset-row">
    <div class="asset-arrow ${dir}">${dir==='up'?'▲':'▼'}</div>
    <div>
      <div class="asset-name">${a.ar} ${a.name}</div>
      <div class="asset-desc">${a.desc}</div>
    </div>
  </div>`;
}

function renderResult(dayGan, dayOh, upOh, downOh){
  const upRows=upOh.map(oh=>assetRow(oh,'up')).join('');
  const downRows=downOh.map(oh=>assetRow(oh,'down')).join('');

  const html=`
  <div class="ticket">
    <div class="ticket-head">
      <div>
        <div class="tk-name">${HANGUL[dayGan]}(${HANJA[dayGan]}) 님</div>
        <div class="tk-code mono">DAY-MASTER · ${dayOh}</div>
      </div>
      <div class="tk-badge">${dayOh}</div>
    </div>
    <div class="gisil">${GISIL[dayGan]}</div>
    <div class="slist">
      <div class="slist-head up">받쳐주는 자산군</div>
      ${upRows}
    </div>
    <div class="slist">
      <div class="slist-head down">반복 손실 패턴 자산군 ★</div>
      ${downRows}
      <div class="asset-desc" style="margin-top:6px">이 계열에서 자꾸 막힌다면 당신의 판단력 문제가 아닙니다. 당신의 기운과 그 자산의 흐름이 구조적으로 부딪히기 때문입니다.</div>
    </div>
    <div class="rx">
      <b>오늘부터 처방</b><br>
      받쳐주는 자산: 소량 진입 후 비중은 나눠서 추가하세요.<br>
      반복 손실 자산: 고레버리지는 절대 금지, 진입 전 손절선을 먼저 정하세요.<br>
      두 계열 이상으로 무리하게 분산하지 마세요.
    </div>
    <div class="heal">잃었던 건 당신이 부족해서가 아니라, 원래 당신의 결과 맞지 않는 자리였을 뿐입니다. 이제는 맞는 흐름에만 힘을 쓰셔도 됩니다.</div>
    <div class="disclaim">※ 본 콘텐츠는 특정 종목·자산을 추천하지 않으며, 성향·심리 진단 참고용입니다. 투자 결정과 그 결과에 대한 책임은 본인에게 있습니다.</div>
  </div>
  <div class="cta-wrap">
    <a class="cta-main" href="#" id="ctaDeep">정밀 진단 — 8개 자산군 전체 보기 →</a>
    <button class="cta-tg" id="ctaTg" onclick="sendToTelegram()">텔레그램으로 결과 보내기</button>
  </div>`;
  document.getElementById('result').innerHTML=html;

  // 정밀 진단 = 돈 테마(50,000) 페이지로 연결
  document.getElementById('ctaDeep').href='./jiaseh-money-pattern.html';

  lastResult={dayGan, dayOh, upOh, downOh};
}

/* ══════════ 텔레그램 WebApp 연동 (있을 때만 노출) ══════════ */
let lastResult=null;
if(window.Telegram && window.Telegram.WebApp){
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
  document.addEventListener('DOMContentLoaded', ()=>{});
}
function sendToTelegram(){
  if(window.Telegram && window.Telegram.WebApp && lastResult){
    Telegram.WebApp.sendData(JSON.stringify(lastResult));
    Telegram.WebApp.close();
  }
}
// 결과 렌더 후 텔레그램 버튼 노출 처리
const _origRenderResult=renderResult;
renderResult=function(...args){
  _origRenderResult(...args);
  const tgBtn=document.getElementById('ctaTg');
  if(tgBtn && window.Telegram && window.Telegram.WebApp){ tgBtn.style.display='block'; }
};
</script>
</body>
</html>
