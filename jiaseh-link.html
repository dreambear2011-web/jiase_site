<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>지아세 知我世 · 링크</title>
<meta name="description" content="지아세 知我世 — 나를 알고, 세상으로. 궁금한 이야기를 골라보세요.">
<meta name="robots" content="index, follow">
<meta property="og:type" content="website">
<meta property="og:title" content="지아세 知我世 · 링크">
<meta property="og:description" content="나를 알고, 세상으로. 궁금한 이야기를 골라보세요.">
<meta property="og:image" content="https://jiase.kr/jiaseh_symbol_traced2_dark.png">
<meta property="og:url" content="https://jiase.kr/link">
<link rel="canonical" href="https://jiase.kr/link">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  :root{
    --cream:#FBF7EF; --paper:#FFFDF8; --line:#ECE3D2;
    --ink:#2E2A24; --ink-soft:#6B6153; --gold:#B8924A;
    --serif:'Nanum Myeongjo', serif;
    --sans:'Pretendard','Apple SD Gothic Neo',system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--cream); color:var(--ink); font-family:var(--sans);
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    min-height:100dvh; padding:max(28px,env(safe-area-inset-top)) 20px max(36px,env(safe-area-inset-bottom));
    display:flex; justify-content:center;
  }
  .wrap{width:100%; max-width:440px}

  /* ── 브랜드 ── */
  .brand{text-align:center; position:relative; padding:8px 0 26px}
  .seal{position:relative; width:76px; height:76px; margin:0 auto 16px; display:grid; place-items:center}
  .seal::before{ /* 은은한 호흡 글로우 = 시그니처 */
    content:""; position:absolute; inset:-24px; border-radius:50%;
    background:radial-gradient(circle, rgba(184,146,74,.20), rgba(184,146,74,0) 66%);
  }
  .seal img{width:76px; height:76px; object-fit:contain; position:relative; z-index:1}
  .seal .fallback{
    position:relative; z-index:1; width:76px; height:76px; border-radius:50%;
    border:1.5px solid var(--gold); color:var(--gold); font-family:var(--serif);
    font-size:34px; display:grid; place-items:center;
  }
  .logo{font-family:var(--serif); font-weight:800; letter-spacing:.14em;
    font-size:34px; margin:0; padding-left:.14em}
  .tag{font-family:var(--serif); color:var(--ink-soft); font-size:15px; letter-spacing:.02em; margin:10px 0 0}
  .lead{font-size:13.5px; color:var(--ink-soft); margin:20px 0 0}

  /* ── 도메인 버튼 ── */
  .links{display:flex; flex-direction:column; gap:11px; margin-top:20px}
  .card{
    display:flex; align-items:center; gap:14px; text-decoration:none; color:inherit;
    background:var(--paper); border:1px solid var(--line); border-radius:16px;
    padding:16px 17px; transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    box-shadow:0 1px 2px rgba(46,42,36,.03);
  }
  .card .dot{flex:0 0 auto; width:10px; height:10px; border-radius:50%; background:var(--dot);
    box-shadow:0 0 0 4px color-mix(in srgb, var(--dot) 16%, transparent)}
  .card .txt{display:flex; flex-direction:column; gap:3px; flex:1 1 auto; min-width:0}
  .card .txt b{font-size:16px; font-weight:600; letter-spacing:-.01em}
  .card .txt small{font-size:12.5px; color:var(--ink-soft)}
  .card .txt .free{color:var(--gold); font-weight:600}
  .card .arw{flex:0 0 auto; color:var(--ink-soft); font-size:17px; transition:transform .18s ease}
  .card:hover,.card:focus-visible{transform:translateY(-2px); box-shadow:0 6px 18px rgba(46,42,36,.08);
    border-color:color-mix(in srgb, var(--dot) 45%, var(--line)); outline:none}
  .card:hover .arw,.card:focus-visible .arw{transform:translateX(3px)}
  .card:focus-visible{box-shadow:0 0 0 3px color-mix(in srgb, var(--dot) 40%, transparent)}

  /* ── 무료 데일리 ── */
  .daily{margin-top:26px; text-align:center}
  .daily-h{font-size:12px; letter-spacing:.12em; color:var(--ink-soft); margin:0 0 12px;
    position:relative}
  .daily-h::before,.daily-h::after{content:""; position:absolute; top:50%; width:34px; height:1px;
    background:var(--line)}
  .daily-h::before{left:calc(50% - 88px)} .daily-h::after{right:calc(50% - 88px)}
  .chips{display:flex; flex-wrap:wrap; justify-content:center; gap:8px}
  .chip{text-decoration:none; color:var(--ink-soft); font-size:13px;
    border:1px solid var(--line); border-radius:999px; padding:8px 14px; background:var(--paper);
    transition:color .18s, border-color .18s}
  .chip:hover,.chip:focus-visible{color:var(--gold); border-color:var(--gold); outline:none}

  /* ── 푸터 ── */
  .foot{margin-top:30px; text-align:center}
  .foot p{font-size:11px; color:var(--ink-soft); line-height:1.6; margin:0}
  .foot .copy{margin-top:10px; font-family:var(--serif); letter-spacing:.1em; color:#B7AD9C}

  /* ── 로드 연출 (모션 최소) ── */
  @media (prefers-reduced-motion: no-preference){
    .seal::before{animation:breathe 5.5s ease-in-out infinite}
    .card{opacity:0; transform:translateY(8px); animation:rise .5s ease forwards}
    .links .card:nth-child(1){animation-delay:.05s}
    .links .card:nth-child(2){animation-delay:.10s}
    .links .card:nth-child(3){animation-delay:.15s}
    .links .card:nth-child(4){animation-delay:.20s}
    .links .card:nth-child(5){animation-delay:.25s}
    .links .card:nth-child(6){animation-delay:.30s}
    @keyframes breathe{0%,100%{opacity:.55; transform:scale(.94)}50%{opacity:1; transform:scale(1.06)}}
    @keyframes rise{to{opacity:1; transform:none}}
  }
</style>
</head>
<body>
  <main class="wrap">
    <header class="brand">
      <div class="seal">
        <img src="https://jiase.kr/jiaseh_symbol_traced_light_FINAL.png" alt="지아세 심볼"
             onerror="this.style.display='none';document.getElementById('seal-fb').style.display='grid'">
        <span class="fallback" id="seal-fb" style="display:none" aria-hidden="true">知</span>
      </div>
      <h1 class="logo">知我世</h1>
      <p class="tag">나를 알고, 세상으로.</p>
      <p class="lead">궁금한 이야기를 골라보세요.</p>
    </header>

    <nav class="links" aria-label="도메인 바로가기">
      <a class="card" href="https://jiase.kr/" style="--dot:#7A8B5A">
        <span class="dot"></span>
        <span class="txt"><b>나의 기질</b><small><span class="free">무료</span> · 오행으로 보는 나</small></span>
        <span class="arw" aria-hidden="true">→</span>
      </a>
      <a class="card" href="https://jiase.kr/케미카드" style="--dot:#C46A5A">
        <span class="dot"></span>
        <span class="txt"><b>인연과 관계</b><small>나와 그 사람의 케미</small></span>
        <span class="arw" aria-hidden="true">→</span>
      </a>
      <a class="card" href="https://jiase.kr/돈운세" style="--dot:#B8924A">
        <span class="dot"></span>
        <span class="txt"><b>재물과 돈</b><small>내 돈의 결</small></span>
        <span class="arw" aria-hidden="true">→</span>
      </a>
      <a class="card" href="https://jiase.kr/일운세" style="--dot:#6E7F8C">
        <span class="dot"></span>
        <span class="txt"><b>커리어와 일</b><small>내 일의 결</small></span>
        <span class="arw" aria-hidden="true">→</span>
      </a>
      <a class="card" href="https://jiase.kr/정화" style="--dot:#8FA07E">
        <span class="dot"></span>
        <span class="txt"><b>건강과 에너지</b><small><span class="free">무료</span> · 나를 돌보는 정화</small></span>
        <span class="arw" aria-hidden="true">→</span>
      </a>
      <a class="card" href="https://jiase.kr/세운" style="--dot:#A98A5E">
        <span class="dot"></span>
        <span class="txt"><b>대운과 흐름</b><small>지금 내 흐름이 어디쯤인지</small></span>
        <span class="arw" aria-hidden="true">→</span>
      </a>
    </nav>

    <section class="daily" aria-label="무료 데일리">
      <p class="daily-h">무료로 매일 받기</p>
      <div class="chips">
        <a class="chip" href="http://pf.kakao.com/_xnZAxfX">카카오톡 채널</a>
        <a class="chip" href="https://telegram.me/TodayMind_bot">오늘의 나</a>
        <a class="chip" href="https://telegram.me/Flow_Jiaseinvest_bot">오늘의 투자운</a>
      </div>
    </section>

    <footer class="foot">
      <p>본 서비스는 의료법·정신건강복지법상 의료행위·심리치료가 아니며,<br>예방적 자기이해 및 의사결정 지원을 목적으로 합니다.</p>
      <p class="copy">© 지아세 知我世</p>
    </footer>
  </main>
</body>
</html>
